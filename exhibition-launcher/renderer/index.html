<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">作品展示ランチャー</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <img src="../assets/kswl-logo.png" alt="Logo" class="logo">
                <h1 id="app-title">作品展示ランチャー</h1>
                <p id="app-description" class="app-description">説明文を読み込み中...</p>
            </div>
        </header>

        <main class="main-content">
            <div id="loading" class="loading">
                <p>作品を読み込み中...</p>
            </div>

            <div id="works-container" class="works-container" style="display: none;">
                <!-- 作品カードがここに動的に追加されます -->
            </div>

            <div id="error-message" class="error-message" style="display: none;">
                <p>作品の読み込みに失敗しました。</p>
            </div>
        </main>
    </div>

    <script src="index.js"></script>
</body>

</html>
